name: Günlük Fiyat Tarama

on:
  schedule:
    - cron: '0 3 * * *'   # Her gün 06:00 Türkiye saati (UTC+3)
  workflow_dispatch:        # GitHub UI'dan manuel tetikleme

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 55 kategori × 3 şehir × ~5-10s gecikme ≈ 60-90 dakika
    permissions:
      contents: write       # branches.yaml'ı repo'ya commit edebilmek için

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: DB şemasını kur
        run: python -m pipeline.runner --setup-schema
        # IF NOT EXISTS → idempotent, her çalışmada güvenli

      - name: Şubeleri keşfet (branches.yaml boşsa)
        run: |
          if ! grep -q "depot_id" config/branches.yaml 2>/dev/null; then
            echo "branches.yaml bulunamadı veya boş — şube keşfi başlatılıyor…"
            python -m pipeline.runner --discover-branches
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add config/branches.yaml
            git diff --cached --quiet || git commit -m "config: sabit şubeler otomatik keşfedildi [skip ci]"
            git push
          else
            echo "branches.yaml zaten dolu — keşif atlanıyor."
          fi

      - name: Fiyatları çek ve DB'ye yaz
        run: python -m pipeline.runner

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
