name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOT: Bu workflow SADECE test çalıştırır.
# Production scraping Oracle Cloud VPS'deki systemd timer tarafından yapılır.

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Testleri çalıştır
        run: pytest tests/ -v --tb=short
        # Gerçek HTTP isteği gerektiren testler -m integration ile ayrılmıştır
